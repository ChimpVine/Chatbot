<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Problem Solver</title>
    <style>
        /* Global styles */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #F8F9D7;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #FFFFFF;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            color: #850F8D;
        }

        label {
            font-weight: bold;
            color: #850F8D;
        }

        input[type="text"], input[type="file"] {
            width: calc(100% - 80px);
            padding: 8px;
            border: 1px solid #C738BD;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            background-color: #850F8D;
            color: #FFFFFF;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #C738BD;
        }

        hr {
            border: none;
            border-top: 1px solid #E49BFF;
            margin: 20px 0;
        }

        /* Processing text */
        .processing {
            color: #850F8D;
            font-style: italic;
            display: none;
        }

        /* API history */
        .history-item {
            background-color: #F8F9D7;
            border: 1px solid #E49BFF;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .history-item strong {
            color: #850F8D;
            display: block;
            margin-bottom: 5px;
        }

        .history-item p {
            margin: 0;
        }

        /* Chatbot container */
        .chat-container {
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            background: white;
            margin-top: 20px; /* Added margin for separation */
        }

        .chat-header, .chat-footer {
            padding: 20px;
            background: #F6CEFC;
            color: #757593; /* Adjusted color for better contrast */
            border-bottom: 1px solid #ccc; /* Improved separation between header and messages */
        }

        .chat-header {
            font-size: 24px;
            text-align: center;
        }

        .chat-messages {
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            background: #fff;
        }

        .chat-input {
            width: calc(100% - 100px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
        }

        .chat-button {
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .message {
            margin-bottom: 20px;
        }

        .message.user {
            text-align: right;
        }

        .message.bot {
            text-align: left;
        }

        .message img {
            max-width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Math Problem Solver</h1>

        <div class="form-group">
            <label for="userInput">Enter Math Question:</label>
            <input type="text" id="userInput" placeholder="e.g., What is the square root of 16?">
            <button onclick="solveText()">Solve</button>
            <span id="textProcessing" class="processing">Processing...</span>
        </div>

        <div class="form-group">
            <label for="normalInput">Enter Normal Text:</label>
            <input type="text" id="normalInput" placeholder="e.g., What is the capital of France?">
            <button onclick="solveNormalText()">Submit</button>
            <span id="normalTextProcessing" class="processing">Processing...</span>
        </div>

        <div class="form-group">
            <label for="imageUrl">Enter Image URL:</label>
            <input type="text" id="imageUrl" placeholder="Paste image URL (must start with http:// or https://)">
            <button onclick="solveImageUrl()">Solve</button>
            <span id="imageUrlProcessing" class="processing">Processing...</span>
        </div>

        <div class="form-group">
            <label for="imageUpload">Upload Image:</label>
            <input type="file" id="imageUpload">
            <button onclick="solveImageUpload()">Solve</button>
            <span id="imageUploadProcessing" class="processing">Processing...</span>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                Equation Plotter Chatbot
            </div>
            <div class="chat-messages" id="chat-messages">
            </div>
            <div class="chat-footer">
                <input type="text" id="equation-input" class="chat-input" placeholder="Enter an equation...">
                <button id="send-button" class="chat-button">Send</button>
            </div>
        </div>
        <hr>

        <h2>API History</h2>
        <div id="historyList"></div>
    </div>
   

    <script>
        async function solveText() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                alert('Please enter a math question.');
                return;
            }
            // Display processing text
            document.getElementById('textProcessing').style.display = 'inline';

            try {
                const response = await fetch('/solve_text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_input: userInput })
                });
                const data = await response.json();
                displayHistory('Text', userInput, data.steps || data.error);
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to process the request. Please try again.');
            } finally {
                // Hide processing text after request completes
                document.getElementById('textProcessing').style.display = 'none';
            }
        }

        async function solveNormalText() {
            const userInput = document.getElementById('normalInput').value.trim();
            if (!userInput) {
                alert('Please enter normal text.');
                return;
            }
            // Display processing text
            document.getElementById('normalTextProcessing').style.display = 'inline';

            try {
                const response = await fetch('/normal_text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_input: userInput })
                });
                const data = await response.json();
                displayHistory('Normal Text', userInput, data.steps || data.error);
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to process the request. Please try again.');
            } finally {
                // Hide processing text after request completes
                document.getElementById('normalTextProcessing').style.display = 'none';
            }
        }

        async function solveImageUrl() {
            const imageUrl = document.getElementById('imageUrl').value.trim();
            if (!imageUrl || !imageUrl.startsWith('http://') && !imageUrl.startsWith('https://')) {
                alert('Please enter a valid image URL.');
                return;
            }
            // Display processing text
            document.getElementById('imageUrlProcessing').style.display = 'inline';

            try {
                const response = await fetch('/solve_image_url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image_url: imageUrl })
                });
                const data = await response.json();
                displayHistory('Image URL', imageUrl, data.steps || data.error);
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to process the request. Please try again.');
            } finally {
                // Hide processing text after request completes
                document.getElementById('imageUrlProcessing').style.display = 'none';
            }
        }

        async function solveImageUpload() {
            const imageUpload = document.getElementById('imageUpload').files[0];
            if (!imageUpload) {
                alert('Please select an image file.');
                return;
            }
            // Display processing text
            document.getElementById('imageUploadProcessing').style.display = 'inline';

            try {
                const formData = new FormData();
                formData.append('image', imageUpload);
                const response = await fetch('/solve_image_upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                displayHistory('Image Upload', imageUpload.name, data.steps || data.error);
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to process the request. Please try again.');
            } finally {
                // Hide processing text after request completes
                document.getElementById('imageUploadProcessing').style.display = 'none';
            }
        }

        async function fetchHistory() {
            try {
                const response = await fetch('/api_history');
                const data = await response.json();
                const historyList = document.getElementById('historyList');
                historyList.innerHTML = ''; // Clear existing content
                data.forEach(item => {
                    const historyItem = document.createElement('div');
                    historyItem.classList.add('history-item');
                    historyItem.innerHTML = `<strong>Type:</strong> ${item.type}<br><strong>Input:</strong> ${item.input}<br><strong>Response:</strong> ${item.response}`;
                    historyList.appendChild(historyItem);
                });
            } catch (error) {
                console.error('Error fetching history:', error);
                alert('Failed to fetch API history.');
            }
        }

        // Display history immediately on page load
        fetchHistory();

        // Function to display history dynamically after each request
        function displayHistory(type, input, response) {
            const historyList = document.getElementById('historyList');
            const historyItem = document.createElement('div');
            historyItem.classList.add('history-item');
            historyItem.innerHTML = `
                <strong>Type:</strong> ${type}
                <p><strong>Input:</strong> ${input}</p>
                <p><strong>Response:</strong> ${response}</p>
            `;
            historyList.insertBefore(historyItem, historyList.firstChild);
        }

        const chatMessages = document.getElementById('chat-messages');
        const equationInput = document.getElementById('equation-input');
        const sendButton = document.getElementById('send-button');

        sendButton.addEventListener('click', async () => {
            const equation = equationInput.value;
            if (equation) {
                addMessage('user', equation);
                equationInput.value = '';
                try {
                    const response = await fetch('/plot', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ equation: equation })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        addMessage('bot', `<img src="${url}" alt="Plot of ${equation}">`);
                    } else {
                        const errorData = await response.json();
                        addMessage('bot', `Error: ${errorData.error}`);
                    }
                } catch (error) {
                    addMessage('bot', `Error: ${error.message}`);
                }
            }
        });

        function addMessage(sender, text) {
            const message = document.createElement('div');
            message.className = `message ${sender}`;
            message.innerHTML = text;
            chatMessages.appendChild(message);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
