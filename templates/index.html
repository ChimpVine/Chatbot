<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChimpVine Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            max-width: 100%;
        }

        .chat-box {
            border: 1px solid #ddd;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .chat-input {
            display: flex;
            align-items: center;
        }

        .chat-input input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px 0 0 8px;
        }

        .chat-input .icon-button {
            background: none;
            border: none;
            padding: 0 10px;
            cursor: pointer;
        }

        .icon-button i {
            font-size: 24px;
            color: #333;
        }

        .icon-button:hover i {
            color: #007bff;
        }

        .message {
            margin: 10px 0;
            word-wrap: break-word;
        }

        .message.user {
            text-align: right;
        }

        .message.bot {
            text-align: left;
        }
    </style>
    <script>
        let mediaRecorder;
        let audioChunks = [];

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    sendAudio(audioBlob);
                    audioChunks = [];
                };

                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 5000); // Adjust duration as needed
            } catch (err) {
                console.error('Error accessing microphone:', err);
                displayMessage('Microphone access denied or not supported', 'bot');
            }
        }

        async function sendAudio(audioBlob) {
            const formData = new FormData();
            formData.append('file', audioBlob, 'speech.wav');

            try {
                const response = await fetch('/voice_input', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.error) {
                    displayMessage(data.error, 'bot');
                } else {
                    displayMessage(data.answer, 'bot');
                }
            } catch (error) {
                displayMessage('Error communicating with server', 'bot');
                console.error('Error:', error);
            }
        }

        async function sendMessage(event) {
            event.preventDefault();
            const inputField = document.getElementById('chat-input');
            const message = inputField.value.trim();
            if (message === '') return;

            displayMessage(message, 'user');
            inputField.value = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: message })
                });

                const data = await response.json();
                if (data.error) {
                    displayMessage(data.error, 'bot');
                } else {
                    displayMessage(data.answer, 'bot');
                }
            } catch (error) {
                displayMessage('Error communicating with server', 'bot');
                console.error('Error:', error);
            }
        }

        function displayMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', sender);
            messageElement.textContent = text;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</head>
<body>
    <div class="chat-container">
        <div id="chat-box" class="chat-box"></div>
        <form class="chat-input" onsubmit="sendMessage(event)">
            <input type="text" id="chat-input" placeholder="Type your question here..." autocomplete="off" />
            <button type="button" class="icon-button" onclick="startRecording()" title="Voice Input">
                <i class="fas fa-microphone"></i>
            </button>
            <button type="button" class="icon-button" onclick="sendMessage(event)" title="Send">
                <i class="fas fa-paper-plane"></i>
            </button>
            <button type="submit" style="display:none;">Send</button>
        </form>
    </div>
</body>
</html>
